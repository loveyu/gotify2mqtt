name: CI / Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write   # 创建 Release 和上传资源文件需要

jobs:
  # ── 代码质量 ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

  # ── 多平台并行构建 ────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - { goos: linux,   goarch: amd64    }
          - { goos: linux,   goarch: arm64    }
          - { goos: linux,   goarch: arm,      goarm: "7" }
          - { goos: linux,   goarch: arm,      goarm: "6" }
          - { goos: linux,   goarch: "386"    }
          - { goos: linux,   goarch: riscv64  }
          - { goos: linux,   goarch: mips64le }
          # macOS
          - { goos: darwin,  goarch: amd64    }
          - { goos: darwin,  goarch: arm64    }
          # Windows
          - { goos: windows, goarch: amd64    }
          - { goos: windows, goarch: arm64    }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build & package
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          # ── 构建产物名称（遵循 {name}_{version}_{os}_{arch} 惯例）──────────
          VERSION="${{ github.ref_name }}"
          # 分支构建时用 commit short SHA 作伪版本
          if [[ "$VERSION" != v* ]]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi

          ARCH="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            ARCH="${ARCH}v${{ matrix.goarm }}"
          fi

          # 产物基础名：gotify2mqtt_{version}_{os}_{arch}
          BASE="gotify2mqtt_${VERSION}_${{ matrix.goos }}_${ARCH}"

          mkdir -p dist

          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN="gotify2mqtt.exe"
          else
            BIN="gotify2mqtt"
          fi

          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/${BIN}" \
            ./

          # ── 打包（Linux/macOS → tar.gz；Windows → zip）─────────────────
          cp config.example.yaml dist/
          cd dist

          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE="${BASE}.zip"
            zip "${ARCHIVE}" "${BIN}" config.example.yaml
          else
            ARCHIVE="${BASE}.tar.gz"
            tar -czf "${ARCHIVE}" "${BIN}" config.example.yaml
          fi

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          ls -lh "${ARCHIVE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          retention-days: 3

  # ── 打 Tag 时发布 Release ─────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          ls -lh
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
