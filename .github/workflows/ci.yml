name: CI / Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write   # GitHub Release & 上传资源
  packages: write   # 推送 Docker 镜像到 GHCR

jobs:
  # ── 代码质量 ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

  # ── 多平台二进制构建 ──────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64    }
          - { goos: linux,   goarch: arm64    }
          - { goos: linux,   goarch: arm,      goarm: "7" }
          - { goos: linux,   goarch: arm,      goarm: "6" }
          - { goos: linux,   goarch: "386"    }
          - { goos: linux,   goarch: riscv64  }
          - { goos: linux,   goarch: mips64le }
          - { goos: darwin,  goarch: amd64    }
          - { goos: darwin,  goarch: arm64    }
          - { goos: windows, goarch: amd64    }
          - { goos: windows, goarch: arm64    }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build & package
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != v* ]]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi

          ARCH="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            ARCH="${ARCH}v${{ matrix.goarm }}"
          fi

          BASE="gotify2mqtt_${VERSION}_${{ matrix.goos }}_${ARCH}"
          mkdir -p dist

          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN="gotify2mqtt.exe"
          else
            BIN="gotify2mqtt"
          fi

          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/${BIN}" \
            ./

          cp config.example.yaml dist/
          cd dist

          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE="${BASE}.zip"
            zip "${ARCHIVE}" "${BIN}" config.example.yaml
          else
            ARCHIVE="${BASE}.tar.gz"
            tar -czf "${ARCHIVE}" "${BIN}" config.example.yaml
          fi

          ls -lh "${ARCHIVE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          retention-days: 3

  # ── Docker 单平台并行构建（推送 digest）────────────────────────────────────────
  docker-build:
    name: Docker (${{ matrix.platform }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
          - linux/arm/v6
          - linux/386
          - linux/riscv64

    steps:
      - uses: actions/checkout@v4

      - name: Prepare safe platform name
        run: |
          SAFE="${{ matrix.platform }}"
          echo "SAFE_PLATFORM=${SAFE//\//-}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gotify2mqtt

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          # 推送裸 digest，不打 tag；由 docker-merge 统一创建 manifest
          outputs: >-
            type=image,
            name=ghcr.io/${{ github.repository_owner }}/gotify2mqtt,
            push-by-digest=true,
            name-canonical=true,
            push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=docker-${{ env.SAFE_PLATFORM }}
          cache-to: type=gha,mode=max,scope=docker-${{ env.SAFE_PLATFORM }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ env.SAFE_PLATFORM }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Docker manifest 合并（多架构 tag）─────────────────────────────────────────
  docker-merge:
    name: Docker Manifest
    needs: docker-build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gotify2mqtt
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/gotify2mqtt@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/gotify2mqtt:${{ steps.meta.outputs.version }}

  # ── 打 Tag 时发布 Release ─────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build, docker-merge]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          ls -lh
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
          body_append: |

            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/gotify2mqtt:${{ github.ref_name }}
            ```
