name: CI / Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write   # GitHub Release & 上传资源
  packages: write   # 推送 Docker 镜像到 GHCR

jobs:
  # ── 代码质量 ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

  # ── 多平台二进制构建 ──────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - { goos: linux,   goarch: amd64    }
          - { goos: linux,   goarch: arm64    }
          - { goos: linux,   goarch: arm,      goarm: "7" }
          - { goos: linux,   goarch: arm,      goarm: "6" }
          - { goos: linux,   goarch: "386"    }
          - { goos: linux,   goarch: riscv64  }
          - { goos: linux,   goarch: mips64le }
          # macOS
          - { goos: darwin,  goarch: amd64    }
          - { goos: darwin,  goarch: arm64    }
          # Windows
          - { goos: windows, goarch: amd64    }
          - { goos: windows, goarch: arm64    }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build & package
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != v* ]]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi

          ARCH="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            ARCH="${ARCH}v${{ matrix.goarm }}"
          fi

          BASE="gotify2mqtt_${VERSION}_${{ matrix.goos }}_${ARCH}"
          mkdir -p dist

          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN="gotify2mqtt.exe"
          else
            BIN="gotify2mqtt"
          fi

          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/${BIN}" \
            ./

          cp config.example.yaml dist/
          cd dist

          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE="${BASE}.zip"
            zip "${ARCHIVE}" "${BIN}" config.example.yaml
          else
            ARCHIVE="${BASE}.tar.gz"
            tar -czf "${ARCHIVE}" "${BIN}" config.example.yaml
          fi

          ls -lh "${ARCHIVE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          retention-days: 3

  # ── Docker 多架构镜像 → GHCR ──────────────────────────────────────────────────
  docker:
    name: Docker Image
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gotify2mqtt
          tags: |
            # v1.2.3 → 1.2.3 / 1.2 / 1 / latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # main 分支 → edge
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            # PR → pr-42
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386,linux/riscv64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 打 Tag 时发布 Release ─────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          ls -lh
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
          body_append: |

            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/gotify2mqtt:${{ github.ref_name }}
            ```
