# Gotify → MQTT 转发服务配置示例
# 支持多个 Gotify 实例（group），每个实例可转发到多个目标（target），
# 每个目标可发布到多个 Broker（broker）。

# PID 文件路径，保证同时只有一个进程（可选，默认 /tmp/gotify-mqtt-forwarder.pid）
pid_file: /var/run/gotify-mqtt-forwarder.pid

groups:
  # ── 示例1：单实例转发 ───────────────────────────────────────────────
  - name: home-gotify
    gotify:
      url: "http://gotify.example.com:8080"
      token: "your-client-token"
      tls_skip_verify: false

    targets:
      - name: all-messages
        filter: {}   # 空 filter 表示转发所有消息

        brokers:
          # ── mqtt:// ── 明文 TCP，本地 Broker ──────────────────────────
          - dsn: "mqtt://user:pass@localhost:1883?client_id=home-forwarder&qos=1&keep_alive=30s"
            topics:
              - "gotify/app/{{.AppID}}/messages"
              - "gotify/user/{{.UserName}}/messages"

          # ── mqtts:// ── TLS 加密 TCP ──────────────────────────────────
          - dsn: "mqtts://user:pass@mqtt.example.com:8883?ca=/etc/ssl/ca.crt&reconnect_delay_max=120s"
            topics:
              - "gotify/{{.AppID}}/{{.Priority}}"

          # ── ws:// ── WebSocket over HTTP ──────────────────────────────
          - dsn: "ws://mqtt.example.com:8083/mqtt?queue_size=512"
            topics:
              - "gotify/ws/{{.ID}}"

          # ── wss:// ── WebSocket over TLS ─────────────────────────────
          - dsn: "wss://mqtt.example.com:8084/mqtt?insecure=true"
            topics:
              - "gotify/wss/all"

      # 只转发特定 App，按优先级过滤
      - name: alert-only
        filter:
          app_ids: [3, 7]
          priority_min: 5
        brokers:
          - dsn: "mqtt://localhost:1883?client_id=home-alert&qos=2&retain=true"
            topics:
              - "alerts/{{.AppID}}/{{.Title}}"

  # ── 示例2：多实例并行 ──────────────────────────────────────────────
  - name: office-gotify
    gotify:
      url: "https://gotify-office.example.com"
      token: "office-token"
      tls_skip_verify: false

    targets:
      - name: office-all
        filter:
          user_ids: [1]   # 仅当前 token 对应用户
        brokers:
          - dsn: "mqtts://admin:secret@mqtt-office.example.com:8883?cert=/etc/ssl/client.crt&key=/etc/ssl/client.key&ca=/etc/ssl/ca.crt"
            topics:
              - "office/gotify/{{.AppID}}"

# ── DSN 参数速查表 ────────────────────────────────────────────────────
# 参数名               | 默认值  | 说明
# --------------------|---------|------------------------------------
# client_id           | 自动    | MQTT 客户端 ID（自动 = group-target-host）
# qos                 | 0       | QoS 等级：0 / 1 / 2
# retain              | false   | 是否设置 RETAIN 标志
# queue_size          | 256     | 异步发布队列深度
# connect_timeout     | 10s     | 连接超时
# keep_alive          | 30s     | MQTT 心跳间隔
# reconnect_delay     | 1s      | 初始重连延迟
# reconnect_delay_max | 60s     | 最大重连延迟（指数退避上限）
# ca                  | ""      | CA 证书路径（mqtts/wss）
# cert                | ""      | 客户端证书路径（双向 TLS）
# key                 | ""      | 客户端私钥路径（双向 TLS）
# insecure            | false   | 跳过 TLS 证书校验

# ── Topic 模板变量 ────────────────────────────────────────────────────
# {{.ID}}        消息 ID（uint）
# {{.AppID}}     应用 ID（uint）
# {{.UserID}}    用户 ID（uint，来自 /current/user）
# {{.UserName}}  用户名（string）
# {{.Title}}     消息标题（特殊字符已转义为 _）
# {{.Priority}}  优先级（int）
# {{.Date}}      消息时间（RFC3339）
